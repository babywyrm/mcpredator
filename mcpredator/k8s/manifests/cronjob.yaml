apiVersion: batch/v1
kind: CronJob
metadata:
  name: mcpredator-recurring
  namespace: mcpredator
  labels:
    app.kubernetes.io/name: mcpredator
    app.kubernetes.io/part-of: agentsmith
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 7200
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: mcpredator
        spec:
          serviceAccountName: mcpredator
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: scanner
              image: mcpredator:latest
              imagePullPolicy: IfNotPresent
              args:
                - "--k8s-discover"
                - "--k8s-discover-namespaces"
                - "default"
                - "--json"
                - "/reports/scan.json"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              volumeMounts:
                - name: reports
                  mountPath: /reports
          volumes:
            - name: reports
              emptyDir: {}
