apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcpredator-impersonate
  labels:
    app.kubernetes.io/name: mcpredator
    app.kubernetes.io/part-of: agentsmith
rules:
  # SA blast radius mapping: impersonate other ServiceAccounts to enumerate
  # their effective permissions via SelfSubjectRulesReview.
  # This is an elevated privilege -- only apply if you want full RBAC auditing.
  - apiGroups: [""]
    resources: ["users", "groups", "serviceaccounts"]
    verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcpredator-impersonate
  labels:
    app.kubernetes.io/name: mcpredator
    app.kubernetes.io/part-of: agentsmith
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcpredator-impersonate
subjects:
  - kind: ServiceAccount
    name: mcpredator
    namespace: mcpredator
